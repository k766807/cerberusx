services:
  - type: web
    name: cerberusx
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: cerberusx-db
          property: connectionString

databases:
  - name: cerberusx-db
    plan: free
    region: oregon
